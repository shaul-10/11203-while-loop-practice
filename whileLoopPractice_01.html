      margin-bottom: 12px;

      border-radius: 8px;

      font-weight: 500;

      text-align: right;

      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;

      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      color: var(--color-dark);

  </style>
</head>

    /* ══════════════════════════════════════════════════════════════
       לוגיקה — אין צורך לשנות כלום מכאן והלאה
    ══════════════════════════════════════════════════════════════ */

    function shuffleOptions(questions) {
      return questions.map(q => {
        const indices = q.options.map((_, i) => i);
        for (let i = indices.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        const newOptions = indices.map(i => q.options[i]);
        const newAnswer  = indices.indexOf(q.answer);
        return { ...q, options: newOptions, answer: newAnswer };
      });
    }

    let shuffledHe = [];
    let shuffledAr = [];

    const state = { he: { current: 0, score: 0 }, ar: { current: 0, score: 0 } };

    const ui = {
      he: {
        next: (c, t) => c === t - 1 ? 'סיום וראה ציון' : 'לשאלה הבאה',
        scoreLabel: s => s >= 8 ? 'מצוין!' : s >= 6 ? 'טוב מאוד!' : s >= 4 ? 'לא רע, כדאי לחזור על החומר' : 'כדאי לחזור על לולאות for',
        restart: 'התחל מחדש',
        home: 'חזור לתפריט',
        qOf: (c, t) => `שאלה ${c} מתוך ${t}`
      },
      ar: {
        next: (c, t) => c === t - 1 ? 'إنهاء وعرض النتيجة' : 'السؤال التالي',
        scoreLabel: s => s >= 8 ? 'ممتاز!' : s >= 6 ? 'جيد جداً!' : s >= 4 ? 'لا بأس، يُنصح بمراجعة المادة' : 'يُنصح بمراجعة حلقات for',
        restart: 'ابدأ من جديد',
        home: 'العودة للقائمة',
        qOf: (c, t) => `سؤال ${c} من ${t}`
      }
    };

    function buildExplanation(lines) {
      return lines.map(l =>
        l.type === 'code'
          ? `<span class="exp-code">${l.text}</span>`
          : `<span class="exp-line">${l.text}</span>`
      ).join('');
    }

    function buildQuestionText(parts) {
      return parts.map(p =>
        p.type === 'code'
          ? `<span class="q-text-code">${p.text}</span>`
          : `<span class="q-text-line">${p.text}</span>`
      ).join('');
    }

    function render(lang) {
      const questions = lang === 'he' ? shuffledHe : shuffledAr;
      const s = state[lang], t = ui[lang], total = questions.length;
      const app = document.getElementById(`app-${lang}`);

      if (s.current >= total) {
        app.innerHTML = `<div class="score-box">
          <div class="score-num">${s.score}/${total}</div>
          <div class="score-label">${t.scoreLabel(s.score)}</div>
          <div class="score-actions">
            <button class="restart-btn" onclick="restartQuiz('${lang}')">${t.restart}</button>
            <button class="home-return-btn" onclick="goHome()">${t.home}</button>
          </div>
        </div>`;
        return;
      }

      const q = questions[s.current];
      const letters = ['A', 'B', 'C', 'D'];
      const pct = (s.current / total * 100).toFixed(0);

      app.innerHTML = `
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="q-card">
          <div class="q-meta">
            <span class="q-num-badge">${t.qOf(s.current + 1, total)}</span>
            <span class="q-topic">${q.topic}</span>
          </div>
          <div class="q-text">${buildQuestionText(q.textParts)}</div>
          <div class="code-block">${q.code}</div>
          <div class="options" id="opts-${lang}">
            ${q.options.map((o, i) => `<button class="opt" onclick="choose('${lang}',${i})"><span class="opt-letter">${letters[i]}.</span>${o}</button>`).join('')}
          </div>
          <div class="explanation" id="exp-${lang}">${buildExplanation(q.explanation)}</div>
          <button class="next-btn" id="nxt-${lang}" onclick="nextQ('${lang}')">${t.next(s.current, total)}</button>
        </div>`;
    }

    function choose(lang, idx) {
      const questions = lang === 'he' ? shuffledHe : shuffledAr;
      const q = questions[state[lang].current];
      const opts = document.querySelectorAll(`#opts-${lang} .opt`);
      opts.forEach(o => o.classList.add('disabled'));
      opts[idx].classList.add(idx === q.answer ? 'correct' : 'wrong');
      if (idx !== q.answer) opts[q.answer].classList.add('correct');
      document.getElementById(`exp-${lang}`).classList.add('show');
      document.getElementById(`nxt-${lang}`).classList.add('show');
      if (idx === q.answer) state[lang].score++;
    }

    function nextQ(lang) { state[lang].current++; render(lang); }

    function restartQuiz(lang) {
      state[lang] = { current: 0, score: 0 };
      if (lang === 'he') shuffledHe = shuffleOptions(questionsHe);
      else               shuffledAr = shuffleOptions(questionsAr);
      render(lang);
    }

    function startQuiz(lang) {
      if (lang === 'he') shuffledHe = shuffleOptions(questionsHe);
      else               shuffledAr = shuffleOptions(questionsAr);
      state[lang] = { current: 0, score: 0 };
      document.getElementById('screen-home').style.display = 'none';
      document.getElementById(`screen-${lang}`).style.display = 'block';
      render(lang);
    }

    function goHome() {
      document.getElementById('screen-he').style.display = 'none';
      document.getElementById('screen-ar').style.display = 'none';
      document.getElementById('screen-home').style.display = 'flex';
    }

  </script>
